<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2235"/>
      <stop offset="100%" stop-color="#141720"/>
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle grid lines (tabель visual) -->
  <line x1="80" y1="170" x2="432" y2="170" stroke="#2d3348" stroke-width="1.5"/>
  <line x1="80" y1="200" x2="432" y2="200" stroke="#2d3348" stroke-width="1.5"/>
  <line x1="80" y1="230" x2="432" y2="230" stroke="#2d3348" stroke-width="1.5"/>

  <!-- Filled cells (shift blocks) — green nights -->
  <rect x="110" y="173" width="34" height="24" rx="4" fill="#22d3a0" opacity="0.9"/>
  <rect x="155" y="173" width="34" height="24" rx="4" fill="#22d3a0" opacity="0.9"/>
  <rect x="245" y="173" width="34" height="24" rx="4" fill="#22d3a0" opacity="0.9"/>
  <rect x="335" y="173" width="34" height="24" rx="4" fill="#22d3a0" opacity="0.6"/>
  <rect x="380" y="173" width="34" height="24" rx="4" fill="#38bdf8" opacity="0.7"/>
  <rect x="155" y="203" width="34" height="24" rx="4" fill="#38bdf8" opacity="0.8"/>
  <rect x="290" y="203" width="34" height="24" rx="4" fill="#22d3a0" opacity="0.7"/>

  <!-- "ТОО" main label -->
  <text
    x="256" y="360"
    font-family="Arial Black, Arial, sans-serif"
    font-size="148"
    font-weight="900"
    text-anchor="middle"
    fill="#6c63ff"
    letter-spacing="-2"
  >ТОО</text>

  <!-- "УЧЁТ" subtitle -->
  <text
    x="256" y="430"
    font-family="Arial, sans-serif"
    font-size="54"
    font-weight="600"
    text-anchor="middle"
    fill="#22d3a0"
    letter-spacing="10"
  >УЧЁТ</text>

  <!-- Accent dot top-right -->
  <circle cx="408" cy="100" r="28" fill="#6c63ff"/>
  <circle cx="408" cy="100" r="18" fill="#22d3a0"/>
</svg>
